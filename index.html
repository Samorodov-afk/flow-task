<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Опросник</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      background: linear-gradient(145deg, #e8ddd0 0%, #d9cdbe 100%);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: -apple-system, 'Helvetica Neue', 'Segoe UI', Roboto, system-ui, sans-serif;
      padding: 12px;
      margin: 0;
    }
    .card {
      background: #f8f4ee;
      width: 100%;
      max-width: 440px;
      border-radius: 48px 48px 40px 40px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.10), 0 8px 20px rgba(0, 0, 0, 0.04);
      padding: 28px 22px 32px;
      border: 1px solid rgba(210, 190, 170, 0.4);
      position: relative;
      overflow: hidden;
      transition: all 0.2s;
      backdrop-filter: blur(2px);
    }
    .card::before {
      content: '';
      position: absolute;
      top: -20%;
      right: -20%;
      width: 70%;
      height: 70%;
      background: radial-gradient(circle, rgba(200, 175, 150, 0.15) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    /* Шаг 1: опросник */
    #stepRole {
      position: relative;
      z-index: 2;
    }
    .poll-title {
      font-size: 2rem;
      font-weight: 300;
      letter-spacing: 0.5px;
      color: #4a3a2a;
      text-align: center;
      margin-bottom: 2px;
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
    }
    .poll-sub {
      text-align: center;
      font-size: 0.95rem;
      font-weight: 400;
      color: #7a6a58;
      margin-bottom: 28px;
      letter-spacing: 0.8px;
      border-bottom: 1px solid #e0d4c6;
      padding-bottom: 18px;
      background: transparent;
      border-radius: 0;
      padding: 8px 0 16px;
      margin-top: 2px;
    }
    .role-selector {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 28px;
    }
    .role-btn {
      background: #f3ede6;
      border: 1.5px solid #d5c8b8;
      border-radius: 60px;
      padding: 16px 20px;
      font-size: 1.2rem;
      font-weight: 450;
      color: #4a3a2a;
      text-align: center;
      cursor: pointer;
      transition: all 0.15s ease;
      box-shadow: 0 2px 0 #cbbcaa;
      letter-spacing: 0.3px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      position: relative;
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
    }
    .role-btn .emoji {
      font-size: 1.8rem;
      line-height: 1;
    }
    .role-btn .check-mark {
      opacity: 0;
      font-size: 1.6rem;
      transition: 0.15s;
      margin-left: auto;
      color: #b08864;
    }
    .role-btn.selected {
      background: #f2e8dd;
      border-color: #c8ad90;
      box-shadow: 0 2px 0 #a8896a;
      transform: scale(1.02);
    }
    .role-btn.selected .check-mark {
      opacity: 1;
    }
    .role-btn:active {
      transform: translateY(2px);
      box-shadow: 0 0px 0 #cbbcaa;
    }

    .continue-wrap {
      text-align: center;
      margin: 4px 0 10px;
    }
    .btn-continue {
      background: #d5c6b4;
      border: none;
      border-radius: 80px;
      padding: 16px 32px;
      font-size: 1.3rem;
      font-weight: 400;
      color: #fcf9f4;
      width: 100%;
      max-width: 240px;
      box-shadow: 0 3px 0 #b6a48e;
      transition: all 0.1s ease;
      cursor: pointer;
      letter-spacing: 0.8px;
      opacity: 0.3;
      pointer-events: none;
      transform: scale(0.97);
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
    }
    .btn-continue.active {
      opacity: 1;
      pointer-events: auto;
      background: #dccbb8;
      box-shadow: 0 3px 0 #b59c80;
      transform: scale(1);
    }
    .btn-continue.active:active {
      transform: translateY(3px);
      box-shadow: 0 0px 0 #b59c80;
    }

    .hint-text {
      font-size: 0.85rem;
      font-weight: 350;
      text-align: center;
      color: #9a8a78;
      margin-top: 6px;
      letter-spacing: 0.4px;
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
    }

    /* Шаг 2: открытка */
    .postcard {
      display: none;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 2;
      padding-top: 4px;
    }
    .postcard.show {
      display: flex;
    }

    .postcard-header {
      font-size: 1rem;
      font-weight: 350;
      color: #7a6a58;
      background: #f0e8de;
      padding: 10px 20px;
      border-radius: 40px;
      letter-spacing: 1.2px;
      border: 1px solid #dccfc0;
      width: 100%;
      text-align: center;
      margin-bottom: 14px;
      box-shadow: inset 0 1px 4px rgba(255,255,255,0.6);
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
    }

    .scratch-card {
      background: #e8dfd4;
      border-radius: 40px;
      padding: 18px 16px 16px;
      width: 100%;
      box-shadow: inset 0 -2px 0 #cdbfae, 0 12px 28px rgba(0,0,0,0.06);
      margin: 0 0 14px;
      position: relative;
      min-height: 200px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .agree-box {
      background: #f3ece2;
      border-radius: 28px;
      padding: 16px 14px 14px;
      margin-bottom: 14px;
      border: 1.5px solid #dccfc0;
      box-shadow: inset 0 2px 6px rgba(255,255,255,0.5);
      text-align: center;
    }
    .agree-box .rule-text {
      font-size: 0.9rem;
      font-weight: 400;
      color: #4f3f2f;
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
    }
    .agree-box .rule-text .phone-icon {
      font-size: 1.4rem;
    }
    .agree-box .rule-text .highlight {
      background: #e4d6c6;
      padding: 0 10px;
      border-radius: 30px;
      font-weight: 500;
      color: #3f2f1f;
    }
    .agree-check {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
      font-size: 0.9rem;
      font-weight: 400;
      color: #4f3f2f;
      cursor: pointer;
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
    }
    .agree-check input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #b08864;
      transform: scale(1.05);
      cursor: pointer;
    }

    .scratch-zone {
      background: #d5c8b8;
      background-image: repeating-linear-gradient(45deg, #ddd0be 0px, #ddd0be 4px, #cebfab 4px, #cebfab 8px);
      border-radius: 32px;
      padding: 24px 12px;
      text-align: center;
      cursor: pointer;
      transition: 0.15s;
      box-shadow: 0 4px 0 #b6a48e;
      border: 1.5px solid #c8b8a4;
      color: #f5ede2;
      font-weight: 350;
      font-size: 1.1rem;
      letter-spacing: 0.8px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.10);
      position: relative;
      min-height: 140px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 4px;
      transition: all 0.2s ease;
      opacity: 0.5;
      pointer-events: none;
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
    }
    .scratch-zone.active {
      opacity: 1;
      pointer-events: auto;
    }
    .scratch-zone:active {
      transform: scale(0.97);
      box-shadow: 0 2px 0 #b6a48e;
    }
    .scratch-zone .coin-icon {
      font-size: 3.6rem;
      display: block;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
      margin-bottom: 2px;
      transition: 0.2s;
    }
    .scratch-zone .instruction {
      font-size: 0.85rem;
      opacity: 0.8;
      background: rgba(0,0,0,0.08);
      padding: 2px 16px;
      border-radius: 40px;
      font-weight: 300;
    }

    @keyframes spinCoin {
      0% { transform: rotate(0deg) scale(1); }
      25% { transform: rotate(180deg) scale(1.15); }
      50% { transform: rotate(360deg) scale(0.92); }
      75% { transform: rotate(540deg) scale(1.08); }
      100% { transform: rotate(720deg) scale(1); }
    }
    .scratch-zone.spinning .coin-icon {
      animation: spinCoin 0.8s ease-in-out 3;
      animation-fill-mode: forwards;
    }
    .scratch-zone.spinning {
      pointer-events: none;
      opacity: 0.7;
    }

    .reveal-content {
      display: none;
      background: #faf5ee;
      border-radius: 32px;
      padding: 28px 16px 24px;
      text-align: center;
      border: 2px solid #dfd0be;
      box-shadow: inset 0 0 0 1px #fffcf5;
      animation: softReveal 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .reveal-content.show {
      display: block;
    }

    @keyframes softReveal {
      0% { opacity: 0; transform: scale(0.94) rotate(-0.8deg); }
      100% { opacity: 1; transform: scale(1) rotate(0); }
    }

    .big-message {
      font-size: 2.4rem;
      font-weight: 400;
      color: #3f2f1f;
      line-height: 1.2;
      margin-bottom: 4px;
      letter-spacing: -0.3px;
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
    }
    .big-message span {
      background: #efe4d6;
      padding: 0 14px;
      border-radius: 60px;
      display: inline-block;
      box-shadow: 0 1px 6px rgba(0,0,0,0.04);
      font-weight: 400;
    }
    .sub-role {
      font-size: 1.2rem;
      font-weight: 350;
      color: #5a4a38;
      margin-top: 6px;
      background: #e8dccf;
      padding: 6px 20px;
      border-radius: 60px;
      display: inline-block;
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
    }
    .call-rule {
      background: #e8dccf;
      border-radius: 60px;
      padding: 12px 16px;
      margin-top: 16px;
      font-size: 0.95rem;
      font-weight: 400;
      color: #3f2f1f;
      border-left: 5px solid #c6ad90;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
    }
    .call-rule .icon-phone {
      font-size: 1.6rem;
    }

    .reset-btn {
      background: #ede4d8;
      border: 1.5px solid #d5c8b8;
      border-radius: 60px;
      padding: 10px 26px;
      font-size: 0.95rem;
      font-weight: 400;
      color: #4a3a2a;
      margin-top: 12px;
      cursor: pointer;
      transition: 0.1s;
      box-shadow: 0 2px 0 #cbbcaa;
      align-self: center;
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
    }
    .reset-btn:active {
      transform: translateY(2px);
      box-shadow: 0 0px 0 #cbbcaa;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 480px) {
      .card { padding: 20px 16px 24px; border-radius: 36px; }
      .poll-title { font-size: 1.7rem; }
      .role-btn { padding: 14px 16px; font-size: 1.05rem; }
      .btn-continue { font-size: 1.15rem; padding: 14px 20px; }
      .big-message { font-size: 2rem; }
      .scratch-zone { min-height: 120px; padding: 18px 10px; }
      .scratch-zone .coin-icon { font-size: 3rem; }
      .agree-box .rule-text { font-size: 0.8rem; }
    }
    @media (max-width: 380px) {
      .role-btn { font-size: 0.95rem; padding: 12px 10px; }
      .big-message { font-size: 1.7rem; }
    }
  </style>
</head>
<body>
<div class="card" id="appCard">
  <!-- ШАГ 1: Опросник -->
  <div id="stepRole">
    <div class="poll-title">Опросник</div>
    <div class="poll-sub">выбери свою роль</div>
    <div class="role-selector">
      <div class="role-btn" data-role="бабушка">
        <span class="emoji">👵</span> Бабушка
        <span class="check-mark">✓</span>
      </div>
      <div class="role-btn" data-role="дедушка">
        <span class="emoji">👴</span> Дедушка
        <span class="check-mark">✓</span>
      </div>
      <div class="role-btn" data-role="тетя">
        <span class="emoji">👩</span> Тётя
        <span class="check-mark">✓</span>
      </div>
    </div>
    <div class="continue-wrap">
      <button class="btn-continue" id="continueBtn">⟶ продолжить</button>
    </div>
    <div class="hint-text">нажми на свою роль</div>
  </div>

  <!-- ШАГ 2: открытка -->
  <div id="stepPostcard" class="postcard">
    <div class="postcard-header">коснись монетки</div>
    <div class="scratch-card">
      <div class="agree-box">
        <div class="rule-text">
          <span class="phone-icon">📞</span>
          <span>Не пиши в чат! <span class="highlight">Только звонок</span></span>
          <span style="font-size:1.2rem;">😉</span>
        </div>
        <label class="agree-check">
          <input type="checkbox" id="agreeCheck"> <span>Соглашаюсь, звонить детям!</span>
        </label>
      </div>

      <div class="scratch-zone" id="scratchZone">
        <span class="coin-icon">🪙</span>
        <span>потри монеткой</span>
        <span class="instruction">(или пальцем)</span>
      </div>

      <div class="reveal-content" id="revealContent">
        <div class="big-message">
          <span id="roleBig">Поздравляем!</span>
        </div>
        <div class="sub-role" id="roleSub">ты снова станешь …</div>
        <div class="call-rule">
          <span class="icon-phone">📞</span>
          <span><strong>Важно!</strong> без чатов — только звонок!</span>
        </div>
      </div>
    </div>
    <button class="reset-btn" id="resetBtn">⟲ начать заново</button>
    <div style="font-size:0.75rem; font-weight:300; color:#9a8a78; margin-top:8px; text-align:center; font-family:-apple-system, 'Helvetica Neue', sans-serif;">
      * поставь галочку, затем три монетку
    </div>
  </div>
</div>

<script>
  (function() {
    const roleBtns = document.querySelectorAll('.role-btn');
    const continueBtn = document.getElementById('continueBtn');
    const stepRole = document.getElementById('stepRole');
    const stepPostcard = document.getElementById('stepPostcard');
    const scratchZone = document.getElementById('scratchZone');
    const revealContent = document.getElementById('revealContent');
    const roleBig = document.getElementById('roleBig');
    const roleSub = document.getElementById('roleSub');
    const resetBtn = document.getElementById('resetBtn');
    const agreeCheck = document.getElementById('agreeCheck');

    let selectedRole = null;

    roleBtns.forEach(btn => {
      btn.addEventListener('click', function(e) {
        roleBtns.forEach(b => b.classList.remove('selected'));
        this.classList.add('selected');
        selectedRole = this.dataset.role;
        continueBtn.classList.add('active');
      });
    });

    continueBtn.addEventListener('click', function() {
      if (!selectedRole) return;
      stepRole.style.display = 'none';
      stepPostcard.classList.add('show');

      scratchZone.style.display = 'flex';
      revealContent.classList.remove('show');
      agreeCheck.checked = false;
      scratchZone.classList.remove('active');
      scratchZone.classList.remove('spinning');

      let bigText = '';
      let subText = '';
      if (selectedRole === 'бабушка') {
        bigText = '🎉 Бабушка!';
        subText = 'ты снова станешь бабушкой ✨';
      } else if (selectedRole === 'дедушка') {
        bigText = '🎉 Дедушка!';
        subText = 'ты снова станешь дедушкой ✨';
      } else if (selectedRole === 'тетя') {
        bigText = '🎉 Тётя!';
        subText = 'ты снова станешь тётей ✨';
      }
      roleBig.innerHTML = `<span>${bigText}</span>`;
      roleSub.textContent = subText;
    });

    agreeCheck.addEventListener('change', function() {
      if (this.checked) {
        scratchZone.classList.add('active');
      } else {
        scratchZone.classList.remove('active');
      }
    });

    scratchZone.addEventListener('click', function(e) {
      if (!agreeCheck.checked) {
        this.style.transform = 'scale(0.95)';
        setTimeout(() => { this.style.transform = ''; }, 150);
        return;
      }

      this.classList.add('spinning');

      setTimeout(() => {
        this.style.display = 'none';
        revealContent.classList.add('show');
        if (navigator.vibrate) navigator.vibrate(20);
      }, 3000);
    });

    resetBtn.addEventListener('click', function() {
      stepRole.style.display = 'block';
      stepPostcard.classList.remove('show');
      roleBtns.forEach(b => b.classList.remove('selected'));
      continueBtn.classList.remove('active');
      selectedRole = null;
      scratchZone.style.display = 'flex';
      revealContent.classList.remove('show');
      agreeCheck.checked = false;
      scratchZone.classList.remove('active');
      scratchZone.classList.remove('spinning');
      roleBig.innerHTML = `<span>Поздравляем!</span>`;
      roleSub.textContent = 'ты снова станешь …';
    });
  })();
</script>
</body>
</html>
